<!DOCTYPE html>
<html>
<head>
  <title>A Minimum Viable Participatory Mapping Project</title>
  <script src="https://unpkg.com/maplibre-gl@3.1.0/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@3.1.0/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    body { margin: 0; padding: 0; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }

    #info {
      position: absolute;
      top: 0;
      left: 0;
      width: 350px;
      margin: 10px;
      padding: 10px;
      background-color: #ffffff;
      border-radius: 5px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      line-height: 1.5;
      color: #000000;
      z-index: 1;
    }

    #popup { padding: 10px; }
    #email, #name, #rating, #price, #content {
      width: 100%;
      margin-bottom: 10px;
      box-sizing: border-box;
    }
    #email, #name { height: 24px; }
    #content { height: 60px; }
    #submit { float: right; }
  </style>
</head>

<body>
  <div id="map"></div>

  <div id="info">
    <h3>A Minimum Viable Participatory Mapping Project</h3>
    <h4>Bo Zhao | University of Washington</h4>
    <p>
      This map is a minimum viable solution to participatory mapping...
      <i>Last update: June 23, 2023</i>
    </p>
  </div>

  <script>
    let popup = null;

    // Store points here
    let geojson = {
      type: "FeatureCollection",
      features: []
    };

    // Basic HTML escaping to prevent XSS in popup content
    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    const map = new maplibregl.Map({
      container: "map",
      style: "https://api.maptiler.com/maps/streets-v2/style.json?key=Cusoe5zmfmn26glFoeoe",
      center: [-122.3321, 47.6062],
      zoom: 12
    });

    map.on("load", async () => {
      // 1) Add source + layer first (empty data is fine)
      map.addSource("places", {
        type: "geojson",
        data: geojson
      });

      map.addLayer({
        id: "placesLayer",
        type: "circle",
        source: "places",
        paint: {
          "circle-radius": 8,
          "circle-color": "#B42222"
        }
      });

      // 2) Then fetch existing records and update the source
      try {
        const response = await fetch("https://yfw-app-8b703328e3ef.herokuapp.com/api/get-records");
        const data = await response.json();

        for (let i = 0; i < data.rows.length; i++) {
          geojson.features.push({
            type: "Feature",
            properties: {
              email: data.rows[i].email,
              name: data.rows[i].name,
              rating: data.rows[i].rating,
              price: data.rows[i].price,
              content: data.rows[i].content
            },
            geometry: {
              type: "Point",
              coordinates: [data.rows[i].lng, data.rows[i].lat]
            }
          });
        }

        map.getSource("places").setData(geojson);
      } catch (err) {
        console.error("Failed to load existing records:", err);
      }
    });

    // Hover popup for existing points
    map.on("mouseenter", "placesLayer", (e) => {
      map.getCanvas().style.cursor = "pointer";

      const feature = e.features[0];
      const coordinates = feature.geometry.coordinates.slice();
      const name = escapeHtml(feature.properties.name);
      const rating = escapeHtml(feature.properties.rating);
      const price = escapeHtml(feature.properties.price);
      const content = escapeHtml(feature.properties.content);

      if (popup) popup.remove();

      popup = new maplibregl.Popup()
        .setLngLat(coordinates)
        .setHTML(`<p><b>${name}</b> <i>said:</i> ${content}</p><div>${rating} ${price}</div>`)
        .addTo(map);
    });

    map.on("mouseleave", "placesLayer", () => {
      map.getCanvas().style.cursor = "";
      if (popup) popup.remove();
      popup = null;
    });

    // Click map to add a new point
    map.on("click", (e) => {
      if (popup) popup.remove();

      const popupContent = `
        <div id="popup">
          <input type="email" id="email" placeholder="Input your email here (not visible to other users)">
          <input type="text" id="name" placeholder="Input restaurant name">
          <input type="number" id="rating" min="1" max="5" placeholder="Rate from 1 to 5">
          <input type="number" id="price" placeholder="How much did you spend per person">
          <textarea id="content" placeholder="Input your review here"></textarea>
          <button id="submit" type="button">submit</button>
        </div>
      `;

      popup = new maplibregl.Popup({ closeOnClick: false })
        .setLngLat(e.lngLat)
        .setHTML(popupContent)
        .addTo(map);

      document.getElementById("submit").addEventListener("click", submitNewRecord);
      e.preventDefault();
    });

    async function submitNewRecord() {
      const email = document.getElementById("email").value;
      const name = document.getElementById("name").value;
      const rating = document.getElementById("rating").value;
      const price = document.getElementById("price").value;
      const content = document.getElementById("content").value;
      const lngLat = popup.getLngLat();

      const newRecord = new URLSearchParams();
      newRecord.append("email", email);
      newRecord.append("name", name);
      newRecord.append("rating", rating);
      newRecord.append("price", price);
      newRecord.append("content", content);
      newRecord.append("lng", lngLat.lng);
      newRecord.append("lat", lngLat.lat);

      const settings = { method: "POST", body: newRecord };

      try {
        await fetch("https://yfw-app-8b703328e3ef.herokuapp.com/api/add-record", settings);
      } catch (err) {
        console.error("Failed to add record:", err);
      } finally {
        if (popup) popup.remove();
        popup = null;

        geojson.features.push({
          type: "Feature",
          properties: { email, name, rating, price, content },
          geometry: {
            type: "Point",
            coordinates: [lngLat.lng, lngLat.lat]
          }
        });

        const src = map.getSource("places");
        if (src) src.setData(geojson);
      }
    }
  </script>
</body>
</html>
